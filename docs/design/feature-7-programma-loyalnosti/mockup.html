<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Программа лояльности</title><script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif}</style></head>
<body class="bg-gray-50">
<div class="max-w-md mx-auto bg-white min-h-screen shadow-xl">
  <div class="bg-gradient-to-r from-orange-500 to-orange-600 text-white px-4 py-4">
    <div class="flex items-center justify-between">
      <button class="p-1"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <h1 class="font-bold text-lg">Программа лояльности</h1>
      <button class="p-1"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
    </div>
    <div class="mt-3"><input type="text" placeholder="Поиск..." class="w-full px-4 py-2 bg-white/20 rounded-xl text-sm text-white placeholder-white/70 focus:outline-none focus:bg-white/30"></div>
  </div>
  <div class="px-4 py-3 flex gap-2 overflow-x-auto">
    <button class="px-4 py-1.5 bg-orange-500 text-white rounded-full text-xs font-medium whitespace-nowrap">Все</button>
    <button class="px-4 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium whitespace-nowrap">Активные</button>
    <button class="px-4 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium whitespace-nowrap">Архив</button>
  </div>
  <div class="px-4 space-y-3 pb-24">
    <div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow">
      <div class="flex items-start justify-between">
        <div class="flex-1"><h3 class="font-semibold text-gray-900">Элемент 1</h3><p class="text-sm text-gray-500 mt-1">Описание элемента с деталями</p></div>
        <span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-full text-xs font-medium">Активен</span>
      </div>
      <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
        <span class="text-xs text-gray-400">Обновлено 2ч назад</span>
        <button class="text-orange-500 text-sm font-medium">Подробнее →</button>
      </div>
    </div>
    <div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm">
      <div class="flex items-start justify-between">
        <div class="flex-1"><h3 class="font-semibold text-gray-900">Элемент 2</h3><p class="text-sm text-gray-500 mt-1">Описание второго элемента</p></div>
        <span class="px-2.5 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-medium">В обработке</span>
      </div>
      <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
        <span class="text-xs text-gray-400">Создано сегодня</span>
        <button class="text-orange-500 text-sm font-medium">Подробнее →</button>
      </div>
    </div>
  </div>
  <div class="fixed bottom-16 right-1/2 translate-x-[calc(50vw-2rem)] max-w-md">
    <button class="w-14 h-14 bg-orange-500 text-white rounded-2xl shadow-lg flex items-center justify-center text-2xl hover:bg-orange-600 transition-colors">+</button>
  </div>
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 max-w-md w-full bg-white border-t border-gray-100 flex">
    <a class="flex-1 py-3 flex flex-col items-center text-orange-500"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="text-[10px] mt-0.5 font-medium">Главная</span></a>
    <a class="flex-1 py-3 flex flex-col items-center text-gray-400"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 5 1.5-1.5-5-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span class="text-[10px] mt-0.5">Поиск</span></a>
    <a class="flex-1 py-3 flex flex-col items-center text-gray-400"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span class="text-[10px] mt-0.5">Профиль</span></a>
  </div>
</div></body></html>
